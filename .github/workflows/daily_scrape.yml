name: MLB Data Daily Scraper

on:
  push:
    branches: [ main ]
  schedule:
    # Runs at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv gspread oauth2client pytz

      - name: Run Scraper and Results Tracker
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: |
          python src/scraper.py
          python src/results_tracker.py