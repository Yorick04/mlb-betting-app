name: Daily MLB Scraper

on:
  schedule:
    # Runs at 13:00 UTC (8:00 AM Central Time) every day
    - cron: '0 13 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Forces GitHub to use Node 24 for the runner
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gspread oauth2client python-dotenv

      - name: Run scraper
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python src/scraper.py
