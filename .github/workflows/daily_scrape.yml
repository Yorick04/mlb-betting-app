name: MLB Data Daily Scraper

on:
  push:
    branches: [ main ]
  schedule:
    # Runs at 09:00 UTC (4:00 AM CT), 18:00 UTC (1:00 PM CT), and 21:00 UTC (4:00 PM CT)
    - cron: '0 9,18,21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and Results Tracker
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: |
          python src/scraper.py
          python src/results_tracker.py