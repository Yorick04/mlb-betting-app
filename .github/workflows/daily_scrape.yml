name: MLB Data Daily Scraper

on:
  push:
    branches: [ main ]
  schedule:
    # Runs at 09:00 UTC (4:00 AM CT), 18:00 UTC (1:00 PM CT), and 21:00 UTC (4:00 PM CT)
    - cron: '0 9,18,21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CRITICAL: This allows the GitHub bot to save the database back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # This speeds up your runs!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper (Fetch Weather, Odds, Stats)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python src/scraper.py

      - name: Retrain AI Models (Learn from yesterday's games)
        run: python src/ai_training.py

      - name: Predict Today & Track Results
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: |
          python src/predict_today.py
          python src/results_tracker.py

      - name: Commit and Push Updated DB & Models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull any new changes the human pushed while the bot was running!
          git pull --rebase origin main
          
          # Stage the updated database and new AI models
          git add mlb_historical_data.db || true
          git add *.pkl || true
          
          # Commit and push ONLY if there are new changes
          git diff --staged --quiet || git commit -m "🤖 Auto-update DB and AI Models"
          git push