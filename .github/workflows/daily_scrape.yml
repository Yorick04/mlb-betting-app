name: Daily MLB Scraper

on:
  schedule:
    # This runs at 14:00 UTC (9:00 AM Central Time) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install the necessary libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gspread oauth2client python-dotenv pytz

      # 4. Run the Audit first (to save yesterday's results before the sheet is cleared)
      - name: Run Audit
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python src/results_tracker.py

      # 5. Run the Scraper (to get today's new games)
      - name: Run Scraper
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python src/scraper.py