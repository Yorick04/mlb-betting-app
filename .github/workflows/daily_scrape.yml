name: Daily MLB Scraper

on:
  schedule:
    # This runs at 13:00 UTC every day (8:00 AM Central Time)
    - cron: '0 13 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Updated from v3 to v4
        uses: actions/checkout@v4

      - name: Set up Python
        # Updated from v4 to v5
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gspread oauth2client python-dotenv

      - name: Run scraper
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python src/scraper.py